<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quiz Du Lịch Thế Giới</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
text-align:center;
color:white;
margin:0;
}

.game{
width:700px;
margin:auto;
margin-top:50px;
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:15px;
}

img{
width:320px;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
transition:0.3s;
}

.question{
font-size:22px;
margin-bottom:20px;
}

button{
display:block;
width:80%;
margin:10px auto;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.correct{
background:#2ecc71;
color:white;
}

.wrong{
background:#e74c3c;
color:white;
}

.next{
background:orange;
color:white;
margin-top:15px;
}

.win{
display:none;
text-align:center;
padding:40px;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div class="game" id="game">

<h1>🌏 Quiz Địa Danh Du Lịch</h1>

<img id="image">

<div class="question" id="question"></div>

<div id="answers"></div>

<button class="next" onclick="nextQuestion()">Câu tiếp ➜</button>

</div>

<div class="win" id="win">

<h1>🏆 Chúc mừng!</h1>
<h2>Bạn đã hoàn thành quiz</h2>

<h3 id="scoreText"></h3>

<button onclick="location.reload()">Chơi lại</button>

</div>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4c8c1b4e0e.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="winSound" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_0625c6f0b5.mp3"></audio>

<script>

const quiz=[

{q:"Kinh thành Huế thuộc tỉnh nào của Việt Nam?",
img:"https://upload.wikimedia.org/wikipedia/commons/9/97/Hue_Imperial_City.jpg",
a:["Quảng Nam","Thừa Thiên Huế","Đà Nẵng","Quảng Bình"],correct:1},

{q:"Kinh thành Huế từng là kinh đô của triều đại nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/9/97/Hue_Imperial_City.jpg",
a:["Triều Lý","Triều Nguyễn","Triều Trần","Triều Lê"],correct:1},

{q:"Văn Miếu Quốc Tử Giám nằm ở thành phố nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Temple_of_Literature_Hanoi.jpg",
a:["Huế","Hà Nội","Đà Nẵng","Hải Phòng"],correct:1},

{q:"Văn Miếu Quốc Tử Giám được xây dựng vào thế kỷ nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Temple_of_Literature_Hanoi.jpg",
a:["Thế kỷ 11","Thế kỷ 13","Thế kỷ 15","Thế kỷ 18"],correct:0},

{q:"Nhà thờ Đức Bà nằm ở thành phố nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Notre-Dame_Cathedral_Basilica_of_Saigon.jpg",
a:["Hà Nội","Huế","TP Hồ Chí Minh","Đà Nẵng"],correct:2},

{q:"Nhà thờ Đức Bà Sài Gòn được xây dựng bởi người nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Notre-Dame_Cathedral_Basilica_of_Saigon.jpg",
a:["Anh","Pháp","Tây Ban Nha","Bồ Đào Nha"],correct:1},

{q:"Taj Mahal nằm ở quốc gia nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/d/da/Taj-Mahal.jpg",
a:["Pakistan","Ấn Độ","Nepal","Thái Lan"],correct:1},

{q:"Taj Mahal được xây dựng để tưởng nhớ ai?",
img:"https://upload.wikimedia.org/wikipedia/commons/d/da/Taj-Mahal.jpg",
a:["Vợ của hoàng đế","Mẹ của hoàng đế","Con gái hoàng đế","Chị gái hoàng đế"],correct:0},

{q:"Vạn Lý Trường Thành nằm ở quốc gia nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6f/GreatWallBadaling.jpg",
a:["Trung Quốc","Hàn Quốc","Nhật Bản","Mông Cổ"],correct:0},

{q:"Đền Borobudur nằm ở quốc gia nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/7/7e/Borobudur-Nothwest-view.jpg",
a:["Thái Lan","Indonesia","Ấn Độ","Campuchia"],correct:1},

{q:"Borobudur là ngôi đền của tôn giáo nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/7/7e/Borobudur-Nothwest-view.jpg",
a:["Phật giáo","Hồi giáo","Thiên Chúa giáo","Ấn Độ giáo"],correct:0},

{q:"Tháp Eiffel nằm ở quốc gia nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg",
a:["Ý","Pháp","Đức","Tây Ban Nha"],correct:1},

{q:"Tháp Eiffel nằm ở thành phố nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg",
a:["Paris","Rome","Madrid","Berlin"],correct:0},

{q:"Đấu trường Colosseum nằm ở thành phố nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/d/d5/Colosseum_in_Rome.jpg",
a:["Rome","Paris","Athens","Berlin"],correct:0},

{q:"Colosseum được sử dụng chủ yếu cho hoạt động nào thời cổ đại?",
img:"https://upload.wikimedia.org/wikipedia/commons/d/d5/Colosseum_in_Rome.jpg",
a:["Đua ngựa","Đấu sĩ","Học tập","Buôn bán"],correct:1},

{q:"Nhà thờ Sagrada Familia nằm ở quốc gia nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Sagrada_Familia_01.jpg",
a:["Pháp","Ý","Tây Ban Nha","Bồ Đào Nha"],correct:2},

{q:"Nhà thờ Sagrada Familia nằm ở thành phố nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/2/2d/Sagrada_Familia_01.jpg",
a:["Madrid","Barcelona","Valencia","Seville"],correct:1},

{q:"Lâu đài Neuschwanstein nằm ở quốc gia nào?",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Schloss_Neuschwanstein.jpg",
a:["Áo","Đức","Thụy Sĩ","Ba Lan"],correct:1},

{q:"Lâu đài Neuschwanstein là cảm hứng cho lâu đài nào của Disney?",
img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Schloss_Neuschwanstein.jpg",
a:["Cinderella Castle","Frozen Castle","Rapunzel Tower","Mermaid Castle"],correct:0}

];

let index=0;
let score=0;
let current;

function nextQuestion(){

if(index>=quiz.length){
showWin();
return;
}

current=quiz[index];

document.getElementById("question").innerText=current.q;
document.getElementById("image").src=current.img;

let html="";

current.a.forEach((ans,i)=>{
html+=`<button id="btn${i}" onclick="check(${i})">${ans}</button>`;
});

document.getElementById("answers").innerHTML=html;

index++;

}

function check(i){

let btn=document.getElementById("btn"+i);

if(i===current.correct){

btn.classList.add("correct");
document.getElementById("correctSound").play();
score++;

setTimeout(()=>{
nextQuestion();
},1000);

}
else{

btn.classList.add("wrong");
document.getElementById("wrongSound").play();

setTimeout(()=>{
btn.style.display="none";
},500);

}

}

function showWin(){

document.getElementById("game").style.display="none";
document.getElementById("win").style.display="block";

document.getElementById("scoreText").innerText="Bạn trả lời đúng "+score+" / "+quiz.length+" câu";

document.getElementById("winSound").play();

for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+"deg,70%,60%)";
c.style.animationDuration=2+Math.random()*3+"s";
document.body.appendChild(c);
}

}

nextQuestion();

</script>

</body>
</html>
